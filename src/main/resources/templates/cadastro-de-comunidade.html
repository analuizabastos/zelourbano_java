<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Comunidade</title>
    <link rel="stylesheet" href="../static/css/cadastro-de-comunidade.css" th:href="@{/css/cadastro-de-comunidade.css}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:wght@400;500&family=Sora:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<main class="main-container">

    <header class="page-header">
        <h2>Cadastro de Comunidade</h2>
        <p>Preencha os dados técnicos e legais para registrar um novo loteamento no sistema.</p>
    </header>

    <form th:action="@{/comunidades/salvar}" method="POST" enctype="multipart/form-data" class="form-layout">

        <div class="form-main-content">

            <section class="form-section">
                <div class="section-title-container">
                    <div class="section-icon"></div>
                    <h3>Identificação</h3>
                </div>

                <div class="input-group">
                    <label>Nome da Comunidade / Loteamento *</label>
                    <input type="text" placeholder="Ex: Residencial Flores" required th:field="*{nome}">
                </div>

                <div class="input-group">
                    <label>CNPJ</label>
                    <input type="text" placeholder="00.000.000/0000-00" th:field="*{cnpj}">
                </div>

                <div class="input-group">
                    <label>E-mail de Contato</label>
                    <input type="email" placeholder="contato@comunidade.com.br" th:field="*{email}">
                </div>

                <div class="input-group">
                    <label>Razão Social</label>
                    <input type="text" th:field="*{razaoSocial}">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Inscrição Estadual</label>
                        <input type="text" th:field="*{inscricaoEstadual}">
                    </div>
                    <div class="input-group">
                        <label>Nome Fantasia</label>
                        <input type="text" th:field="*{nomeFantasia}">
                    </div>
                </div>
            </section>

            <section class="form-section">
                <div class="section-title-container">
                    <div class="section-icon"></div>
                    <h3>Dados Técnicos</h3>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Área Total (m²)</label>
                        <input type="number" placeholder="m²" th:field="*{areaTotal}">
                    </div>
                    <div class="input-group">
                        <label>Quantidade de Lotes</label>
                        <input type="number" placeholder="0" th:field="*{qtdLotes}">
                    </div>
                </div>
            </section>

            <section class="form-section">
                <div class="section-title-container">
                    <h3>Observações</h3>
                </div>

                <div class="input-group">
                    <textarea placeholder="Informações adicionais sobre a comunidade..." th:field="*{observacoes}"></textarea>
                </div>
            </section>

        </div>

        <aside class="form-sidebar">

            <div class="sidebar-block upload-box">
                <div class="section-title-container">
                    <div class="section-icon"></div>
                    <h3>Documentos</h3>
                </div>
                <p class="sidebar-description">Anexe os documentos de identificação, caso tenha Pessoa Jurídica (Apenas PDF).</p>

                <label class="dropzone">
                    <div class="upload-icon"></div>
                    <span>Clique para anexar arquivo</span>
                    <input type="file" accept=".pdf" style="display: none;">
                </label>

                <div class="file-uploaded">
                    <div class="file-info">
                        <div class="file-icon"></div>
                        <span class="file-name">cnpj.pdf</span>
                    </div>
                    <button type="button" class="btn-remove-file"></button>
                </div>
            </div>

            <div class="sidebar-block cta-box">
                <h4>Finalizar registro?</h4>
                <button type="submit" class="btn-submit">
                    <span>CADASTRAR COMUNIDADE</span>
                    <div class="btn-icon"></div>
                </button>
            </div>

        </aside>

    </form>
</main>

</body>
</html>
